<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>TXT ↔ M3U 双向转换 · 纯净版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8A2BE2;
            --primary-light: #f4e9ff;
            --primary-soft: #e8d6ff;
            --primary-dark: #4a148c;
            --card: rgba(255, 255, 255, 0.85);
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(138, 43, 226, 0.2);
            --radius: 24px;
            --radius-sm: 16px;
            --shadow: 0 8px 30px rgba(138, 43, 226, 0.12);
            --text: #2d2d2f;
            --text-secondary: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--primary-light);
            min-height: 100vh;
            color: var(--text);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-api {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top left, #f8f0ff, #e9d8ff);
            z-index: -2;
        }

        .bg-api::after {
            content: '';
            position: absolute;
            inset: 0;
            backdrop-filter: blur(60px);
            background: rgba(255,255,255,.4);
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            width: 94%;
            margin: 30px auto;  /* 上下边距减少，因为没有导航栏 */
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 0px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            background: linear-gradient(135deg, #7B2CBF, #9c27b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header p {
            color: var(--primary-dark);
            background: var(--primary-soft);
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            opacity: 0.9;
        }

        .mode-settings-bar {
            background: rgba(255,255,255,.6);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mode-tabs {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: center;
        }

        .mode-btn {
            border: none;
            background: transparent;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .mode-btn.active-mode {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(138, 43, 226, 0.25);
        }

        /* EPG 一行，拉宽 */
        .epg-row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .epg-row label {
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
        }
        .epg-row input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 12px;
            background: #fff;
            font-size: 14px;
            outline: none;
            min-width: 0;
        }

        /* 选项行：台标 + 分组 */
        .options-row {
            width: 100%;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .setting-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            background: white;
            padding: 5px 10px;
            border-radius: 30px;
        }

        .workspace {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0 24px;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: var(--radius-sm);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.06);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #222;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-badge {
            background: var(--primary);
            color: white;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 12px;
        }

        .panel-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: white;
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            color: #444;
            white-space: nowrap;
            transition: .2s;
        }

        .icon-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            background: #faf6ff;
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: #f4eaff;
        }

        .upload-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .upload-text {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .upload-hint {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        .file-tag {
            display: inline-block;
            background: var(--primary-soft);
            border-radius: 40px;
            padding: 4px 12px;
            margin-top: 8px;
            font-size: 12px;
        }

        .file-tag .remove {
            margin-left: 8px;
            font-weight: bold;
            cursor: pointer;
            color: var(--primary-dark);
        }

        .editor-wrapper {
            display: flex;
            flex-direction: column;
        }

        .editor-hint {
            background: var(--primary-light);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .editor-hint code {
            background: #fff0d7;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 12px;
        }

        textarea {
            width: 100%;
            height: 260px;
            padding: 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: #fdfdff;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.1);
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .panel.output textarea {
            background: #fffef8;
        }

        .download-bar {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-primary, .btn-secondary {
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            border: none;
            flex: 1;
            transition: .2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.2);
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .convert-divider {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .convert-btn {
            background: linear-gradient(135deg, #7B2CBF, #9C27B
